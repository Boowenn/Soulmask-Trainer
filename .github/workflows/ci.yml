name: CI

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        shell: pwsh
        run: python -m unittest discover -s tests -v

      - name: Run compile smoke test
        shell: pwsh
        run: python -m compileall main.py soulmask_trainer tests

  build-windows:
    needs: test
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Build executable
        shell: pwsh
        run: .\build.ps1

      - name: Verify packaged files
        shell: pwsh
        run: |
          if (-not (Test-Path dist/SoulmaskTrainer.exe)) {
            throw "Missing dist/SoulmaskTrainer.exe"
          }
          if (-not (Test-Path release/SoulmaskTrainer-windows.zip)) {
            throw "Missing release/SoulmaskTrainer-windows.zip"
          }
          Get-Item dist/SoulmaskTrainer.exe, release/SoulmaskTrainer-windows.zip |
            Select-Object Name, Length |
            Format-Table -AutoSize

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SoulmaskTrainer-windows
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/SoulmaskTrainer.exe
            release/SoulmaskTrainer-windows.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-windows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: SoulmaskTrainer-windows
          path: artifacts
          merge-multiple: true

      - name: Inspect downloaded artifacts
        shell: bash
        run: find artifacts -maxdepth 3 -type f | sort

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.zip
