name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        shell: pwsh
        run: python -m unittest discover -s tests -v

      - name: Run compile smoke test
        shell: pwsh
        run: python -m compileall main.py soulmask_trainer tests

  build-windows:
    needs: test
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build executable
        shell: pwsh
        run: .\build.ps1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SoulmaskTrainer-windows
          path: |
            dist/SoulmaskTrainer.exe
            release/SoulmaskTrainer-windows.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: SoulmaskTrainer-windows
          path: artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/SoulmaskTrainer.exe
            artifacts/SoulmaskTrainer-windows.zip
